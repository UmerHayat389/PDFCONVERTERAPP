# Project-wide Gradle settings

# JVM memory settings (important for big React Native builds)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Enable AndroidX (required for React Native)
android.useAndroidX=true
android.enableJetifier=true

# React Native architectures
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# NEW ARCHITECTURE (Fabric + TurboModules)
# ⚠️ Set false if builds are too slow or unstable
newArchEnabled=true

# Hermes JS engine (recommended ON for performance)
hermesEnabled=true

# Edge-to-edge UI support
edgeToEdgeEnabled=false

# Enable Gradle daemon (faster builds)
org.gradle.daemon=true

# Parallel build (faster on multi-core CPU)
org.gradle.parallel=true

# Configuration cache (can speed up builds)
org.gradle.configuration-cache=true

# Reduce warnings noise
org.gradle.warning.mode=all


org.gradle.configuration-cache=false